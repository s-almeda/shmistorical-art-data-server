<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Database Browser</title>
    <link rel="stylesheet" href="../static/css/admin_styles.css">
    <style>
        /* ── Database-switcher tabs ── */
        .db-tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 10px;
        }
        .db-tab {
            padding: 6px 18px;
            border-radius: 20px;
            border: 2px solid #ccc;
            background: #fff;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            transition: all .15s;
            color: #555;
        }
        .db-tab.active {
            border-color: #2c3e50;
            background: #2c3e50;
            color: #fff;
        }
        .db-tab.comics.active {
            border-color: #8e44ad;
            background: #8e44ad;
        }
        .db-tab.poetry.active {
            border-color: #27ae60;
            background: #27ae60;
        }

        /* ── Poetry breadcrumb bar ── */
        #poetry-breadcrumb {
            display: none;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #555;
            margin-bottom: 6px;
            flex-wrap: wrap;
        }
        #poetry-breadcrumb.visible { display: flex; }

        /* ── Poetry line display ── */
        .poetry-line-text {
            font-style: italic;
            color: #2c3e50;
        }

        /* ── Comics breadcrumb bar ── */
        #comics-breadcrumb {
            display: none;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #555;
            margin-bottom: 6px;
            flex-wrap: wrap;
        }
        #comics-breadcrumb.visible { display: flex; }
        .crumb-btn {
            background: none;
            border: 1px solid #aaa;
            border-radius: 4px;
            padding: 2px 10px;
            font-size: 12px;
            cursor: pointer;
            color: #333;
        }
        .crumb-btn:hover { background: #f0f0f0; }
        .crumb-sep { color: #aaa; }

        /* ── Cover thumbnail in book_entries table ── */
        .cover-thumb {
            width: 48px;
            height: 64px;
            object-fit: cover;
            border-radius: 3px;
            cursor: pointer;
            display: block;
        }

        /* ── Page grid inside book detail modal ── */
        .page-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
            gap: 8px;
            margin-top: 10px;
        }
        .page-cell {
            text-align: center;
            cursor: pointer;
        }
        .page-cell img {
            width: 100%;
            border-radius: 3px;
            border: 2px solid transparent;
            transition: border-color .15s;
        }
        .page-cell img:hover { border-color: #8e44ad; }
        .page-cell span {
            display: block;
            font-size: 10px;
            color: #888;
            margin-top: 2px;
        }

        /* ── Drill-down link style ── */
        a.drill { color: #8e44ad; text-decoration: underline; cursor: pointer; }
    </style>
    <!-- XP.css look for the public site (loaded AFTER admin_styles + inline styles) -->
    <link rel="stylesheet" href="https://unpkg.com/xp.css" />
    <link rel="stylesheet" href="../static/css/shm-xp.css" />
</head>
<body>
    <div class="container">
        <div class="header window">
            <div class="title-bar">
                <div class="title-bar-text">🎨 shm's historical art data — knowledgebase browser</div>
                <div class="title-bar-controls">
                    <button aria-label="Minimize"></button>
                    <button aria-label="Maximize"></button>
                    <button aria-label="Help" onclick="location.href='/about'"></button>
                </div>
            </div>
            <div class="window-body">
            <div class="header-top">
                <h1 id="page-title">this is a browser for shm's historical art data(s)</h1>
                <div class="pagination-top" id="pagination-top">
                    <button class="page-btn" id="prev-btn-top" onclick="changePage(-1)">← Previous</button>
                    <span class="page-info" id="page-info-top">Page 1</span>
                    <button class="page-btn" id="next-btn-top" onclick="changePage(1)">Next →</button>
                    <button class="page-btn" id="last-btn-top" onclick="goToLastPage()">Last »</button>
                </div>
            </div>

            <!-- Database selector -->
            <div class="db-tabs">
                <button class="db-tab active"   id="db-tab-art"    onclick="switchDb('art')">art </button>
                <button class="db-tab comics"   id="db-tab-comics" onclick="switchDb('comics')">comics</button>
                <button class="db-tab poetry"  id="db-tab-poetry" onclick="switchDb('poetry')">poetry</button>
                <a href="/about" class="db-tab" style="margin-left:auto;text-decoration:none;line-height:normal;">about</a>
            </div>

            <!-- Poetry breadcrumb -->
            <div id="poetry-breadcrumb">
                <button class="crumb-btn" onclick="poetryDrillTo('text_entries')">All Authors / Subjects</button>
                <span class="crumb-sep" id="pcrumb-sep-1" style="display:none">›</span>
                <button class="crumb-btn" id="pcrumb-book-btn" style="display:none" onclick="poetryDrillTo('line_entries')"></button>
            </div>

            <!-- Comics breadcrumb (hidden when browsing art DB) -->
            <div id="comics-breadcrumb">
                <button class="crumb-btn" onclick="comicsDrillTo('text_entries')">All Series</button>
                <span class="crumb-sep" id="crumb-sep-1" style="display:none">›</span>
                <button class="crumb-btn" id="crumb-series-btn" style="display:none" onclick="comicsDrillTo('book_entries')"></button>
                <span class="crumb-sep" id="crumb-sep-2" style="display:none">›</span>
                <button class="crumb-btn" id="crumb-book-btn"   style="display:none" onclick="comicsDrillTo('image_entries')"></button>
            </div>

            <div class="controls">
                <!-- Art DB table switcher -->
                <div class="table-selector" id="art-table-selector">
                    <button class="table-btn" onclick="artSwitchTable('text_entries')">Text Entries</button>
                    <button class="table-btn active" onclick="artSwitchTable('image_entries')">Image Entries</button>
                </div>
                <!-- Poetry DB table switcher -->
                <div class="table-selector" id="poetry-table-selector" style="display:none">
                    <button class="table-btn active" id="ptab-text" onclick="poetrySwitchTable('text_entries')">Authors / Subjects</button>
                    <button class="table-btn"        id="ptab-book" onclick="poetrySwitchTable('book_entries')">Books</button>
                    <button class="table-btn"        id="ptab-line" onclick="poetrySwitchTable('line_entries')">Lines</button>
                </div>
                <!-- Comics DB table switcher -->
                <div class="table-selector" id="comics-table-selector" style="display:none">
                    <button class="table-btn active" id="ctab-text"  onclick="comicsSwitchTable('text_entries')">Series / Creators</button>
                    <button class="table-btn"        id="ctab-book"  onclick="comicsSwitchTable('book_entries')">Books / Issues</button>
                    <button class="table-btn"        id="ctab-image" onclick="comicsSwitchTable('image_entries')">Pages</button>
                </div>

                <div class="stats" id="stats">Loading...</div>
                <input id="search-bar" type="text" placeholder="Search..."
                    style="margin-left:16px;padding:4px 10px;border-radius:4px;border:1px solid #ccc;width:200px;"
                    oninput="onSearchInput()">
                <label for="page-size" style="font-size:14px;margin-left:10px;">Show per page:</label>
                <select id="page-size" style="margin-left:4px;padding:4px 8px;border-radius:4px;" onchange="onPageSizeChange()">
                    <option value="25">25</option>
                    <option value="100">100</option>
                    <option value="500">500</option>
                    <option value="1000">1000</option>
                    <option value="all">All</option>
                </select>
                <label for="download-size" style="font-size:14px;margin-left:10px;">Download:</label>
                <select id="download-size" style="margin-left:4px;padding:4px 8px;border-radius:4px;">
                    <option value="100">100</option>
                    <option value="500">500</option>
                    <option value="1000">1000</option>
                    <option value="all">All</option>
                </select>
                <button class="page-btn" onclick="downloadCurrentTableAsJSON()">Download as JSON</button>
            </div>
            </div><!-- /.window-body -->
        </div>

        <div class="table-container window">
            <div class="title-bar">
                <div class="title-bar-text">📊 records</div>
            </div>
            <div class="window-body" style="margin:0;padding:6px;">
                <div id="table-content"><div class="loading">Loading data...</div></div>
            </div>
        </div>
    </div>

    <!-- Detail modal -->
    <div id="detailModal" class="modal" onclick="closeModalOnBackdrop(event)">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Details</h2>
                <span class="close" onclick="closeModal()">&times;</span>
            </div>
            <div class="modal-body" id="modal-body"></div>
        </div>
    </div>

<script>
// ============================================================
//  STATE
// ============================================================
let activeDb       = 'art';   // 'art' | 'comics'
let currentTable   = 'image_entries';
let currentPage    = 1;
let totalPages     = 1;
let pageSize       = 25;
let totalRows      = 0;
let currentData    = null;
let sortColumn     = null;
let sortDirection  = 'asc';
let searchQuery    = '';
let filteredRows   = null;

// Comics drill-down context
let comicsFilter   = { series_id: null, seriesLabel: null, book_id: null, bookLabel: null };
// Poetry drill-down context
let poetryFilter   = { book_id: null, bookLabel: null };

// ============================================================
//  DB SWITCHING
// ============================================================
function switchDb(db) {
    activeDb = db;
    currentPage   = 1;
    sortColumn    = null;
    sortDirection = 'asc';
    searchQuery   = '';
    document.getElementById('search-bar').value = '';

    // Update tab styles
    document.getElementById('db-tab-art').classList.toggle('active',    db === 'art');
    document.getElementById('db-tab-comics').classList.toggle('active', db === 'comics');
    document.getElementById('db-tab-poetry').classList.toggle('active', db === 'poetry');

    // Show/hide control panels
    document.getElementById('art-table-selector').style.display    = db === 'art'    ? '' : 'none';
    document.getElementById('comics-table-selector').style.display = db === 'comics' ? '' : 'none';
    document.getElementById('poetry-table-selector').style.display = db === 'poetry' ? '' : 'none';
    document.getElementById('comics-breadcrumb').classList.toggle('visible', db === 'comics');
    document.getElementById('poetry-breadcrumb').classList.toggle('visible', db === 'poetry');
    document.getElementById('page-title').textContent =
        db === 'art' ? '🎨 Art / Knowledgebase Browser' :
        db === 'comics' ? '📚 Comics Browser' : '📜 Poetry Browser';

    if (db === 'art') {
        currentTable = 'image_entries';
        document.querySelectorAll('#art-table-selector .table-btn').forEach((b,i) => b.classList.toggle('active', i===1));
    } else if (db === 'comics') {
        // Reset comics filter & go to series list
        comicsFilter = { series_id: null, seriesLabel: null, book_id: null, bookLabel: null };
        currentTable = 'text_entries';
        updateComicsBreadcrumb();
        document.querySelectorAll('#comics-table-selector .table-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('ctab-text').classList.add('active');
    } else {
        // Reset poetry filter & go to authors/subjects
        poetryFilter = { book_id: null, bookLabel: null };
        currentTable = 'text_entries';
        updatePoetryBreadcrumb();
        updatePoetryTabHighlight('text_entries');
    }
    loadData();
}

// ============================================================
//  ART DB – table switching (unchanged behaviour)
// ============================================================
function artSwitchTable(tableName) {
    document.querySelectorAll('#art-table-selector .table-btn').forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');
    currentTable  = tableName;
    currentPage   = 1;
    sortColumn    = null;
    sortDirection = 'asc';
    loadData();
}

// ============================================================
//  COMICS DB – table switching & drill-down
// ============================================================
function comicsSwitchTable(tableName) {
    // Reset filter context when manually switching tabs
    comicsFilter = { series_id: null, seriesLabel: null, book_id: null, bookLabel: null };
    currentTable = tableName;
    currentPage  = 1;
    sortColumn   = null;
    updateComicsTabHighlight(tableName);
    updateComicsBreadcrumb();
    loadData();
}

function updateComicsTabHighlight(tableName) {
    document.getElementById('ctab-text').classList.toggle('active',  tableName === 'text_entries');
    document.getElementById('ctab-book').classList.toggle('active',  tableName === 'book_entries');
    document.getElementById('ctab-image').classList.toggle('active', tableName === 'image_entries');
}

/**
 * Drill into books for a series, or pages for a book.
 * Called from table row clicks (series → books) and book rows (books → pages).
 */
function comicsDrillIntoSeries(seriesId, seriesLabel) {
    comicsFilter.series_id   = seriesId;
    comicsFilter.seriesLabel = seriesLabel;
    comicsFilter.book_id     = null;
    comicsFilter.bookLabel   = null;
    currentTable = 'book_entries';
    currentPage  = 1;
    sortColumn   = null;
    updateComicsTabHighlight('book_entries');
    updateComicsBreadcrumb();
    loadData();
}

function comicsDrillIntoBook(bookId, bookLabel) {
    comicsFilter.book_id   = bookId;
    comicsFilter.bookLabel = bookLabel;
    currentTable = 'image_entries';
    currentPage  = 1;
    sortColumn   = null;
    updateComicsTabHighlight('image_entries');
    updateComicsBreadcrumb();
    loadData();
}

/** Breadcrumb navigation — called by crumb buttons */
function comicsDrillTo(tableName) {
    if (tableName === 'text_entries') {
        comicsFilter = { series_id: null, seriesLabel: null, book_id: null, bookLabel: null };
    } else if (tableName === 'book_entries') {
        comicsFilter.book_id   = null;
        comicsFilter.bookLabel = null;
    }
    currentTable = tableName;
    currentPage  = 1;
    sortColumn   = null;
    updateComicsTabHighlight(tableName);
    updateComicsBreadcrumb();
    loadData();
}

function updateComicsBreadcrumb() {
    const sep1    = document.getElementById('crumb-sep-1');
    const serBtn  = document.getElementById('crumb-series-btn');
    const sep2    = document.getElementById('crumb-sep-2');
    const bookBtn = document.getElementById('crumb-book-btn');

    if (comicsFilter.series_id) {
        sep1.style.display  = '';
        serBtn.style.display = '';
        serBtn.textContent  = comicsFilter.seriesLabel || comicsFilter.series_id;
    } else {
        sep1.style.display  = 'none';
        serBtn.style.display = 'none';
    }

    if (comicsFilter.book_id) {
        sep2.style.display  = '';
        bookBtn.style.display = '';
        bookBtn.textContent = comicsFilter.bookLabel || comicsFilter.book_id;
    } else {
        sep2.style.display  = 'none';
        bookBtn.style.display = 'none';
    }
}

// ============================================================
//  PAGINATION / PAGE SIZE
// ============================================================
function changePage(direction) {
    const newPage = currentPage + direction;
    if (newPage >= 1 && newPage <= totalPages) { currentPage = newPage; loadData(); }
}
function goToLastPage() { currentPage = totalPages; loadData(); }
function onPageSizeChange() {
    pageSize = document.getElementById('page-size').value;
    currentPage = 1;
    loadData();
}
function onSearchInput() {
    searchQuery = document.getElementById('search-bar').value.trim().toLowerCase();
    displayData(currentData);
}

// ============================================================
//  CORE DATA LOAD
// ============================================================
function loadData() {
    document.getElementById('table-content').innerHTML = '<div class="loading">Loading data...</div>';

    let ps = (pageSize === 'all') ? 1_000_000 : parseInt(pageSize, 10) || 25;
    let url;

    if (activeDb === 'art') {
        url = `/api/browse_database?table=${currentTable}&page=${currentPage}&page_size=${ps}`;
    } else if (activeDb === 'comics') {
        url = `/api/comics/browse?table=${currentTable}&page=${currentPage}&page_size=${ps}`;
        if (comicsFilter.series_id) url += `&series_id=${encodeURIComponent(comicsFilter.series_id)}`;
        if (comicsFilter.book_id)   url += `&book_id=${encodeURIComponent(comicsFilter.book_id)}`;
    } else {
        url = `/api/poetry/browse?table=${currentTable}&page=${currentPage}&page_size=${ps}`;
        if (poetryFilter.book_id) url += `&book_id=${encodeURIComponent(poetryFilter.book_id)}`;
    }

    if (sortColumn) url += `&sort_by=${sortColumn}&sort_dir=${sortDirection}`;

    fetch(url)
        .then(r => r.json())
        .then(data => {
            if (data.success) {
                currentData = data;
                displayData(data);
                updatePagination(data);
                updateStats(data);
            } else {
                document.getElementById('table-content').innerHTML =
                    `<div class="error">Error: ${data.error}</div>`;
            }
        })
        .catch(err => {
            document.getElementById('table-content').innerHTML =
                `<div class="error">Failed to load data: ${err}</div>`;
        });
}

// ============================================================
//  DISPLAY
// ============================================================
function displayData(data) {
    const el = document.getElementById('table-content');
    if (!data?.rows?.length) { el.innerHTML = '<div class="empty">No data found</div>'; filteredRows = []; return; }

    filteredRows = searchQuery
        ? data.rows.filter(row => Object.values(row).some(v => {
            if (v == null) return false;
            return (typeof v === 'object' ? JSON.stringify(v) : String(v)).toLowerCase().includes(searchQuery);
          }))
        : data.rows;

    if (!filteredRows.length) { el.innerHTML = '<div class="empty">No data found</div>'; return; }

    // Route to the right renderer
    if (activeDb === 'art') {
        el.innerHTML = currentTable === 'text_entries' ? renderArtTextTable() : renderArtImageTable();
    } else if (activeDb === 'comics') {
        if (currentTable === 'text_entries')      el.innerHTML = renderComicsTextTable();
        else if (currentTable === 'book_entries') el.innerHTML = renderComicsBookTable();
        else                                      el.innerHTML = renderComicsImageTable();
    } else {
        if (currentTable === 'text_entries')      el.innerHTML = renderPoetryTextTable();
        else if (currentTable === 'book_entries') el.innerHTML = renderPoetryBookTable();
        else                                      el.innerHTML = renderPoetryLineTable();
    }
}

// ── helpers ─────────────────────────────────────────────────
function th(label, col) {
    const cls = sortColumn === col ? `sorted-${sortDirection}` : '';
    return `<th onclick="sortBy('${col}')" class="${cls}">${label}</th>`;
}
function sortBy(col) {
    sortDirection = (sortColumn === col && sortDirection === 'asc') ? 'desc' : 'asc';
    sortColumn = col;
    loadData();
}
function fmtArray(jsonStr, max=3) {
    if (!jsonStr) return '-';
    try {
        const a = JSON.parse(jsonStr);
        if (!Array.isArray(a) || !a.length) return '-';
        const preview = a.slice(0, max).join(', ');
        return a.length > max ? `${preview} <em>+${a.length-max}</em>` : preview;
    } catch { return jsonStr.substring(0, 60); }
}
function thumbUrl(imageUrlsJson) {
    if (!imageUrlsJson) return null;
    try {
        const u = JSON.parse(imageUrlsJson);
        return u.thumb || u.small || u.medium || u.normalized || Object.values(u)[0];
    } catch { return null; }
}
function bestUrl(imageUrlsJson) {
    if (!imageUrlsJson) return null;
    try {
        const u = JSON.parse(imageUrlsJson);
        return u.larger || u.large || u.full || u.medium || u.normalized || Object.values(u)[0];
    } catch { return null; }
}

// ── ART renderers (unchanged logic, just factored out) ───────
function renderArtImageTable() {
    let h = `<table><thead><tr>
        <th>Image</th>
        ${th('ID','image_id')} ${th('Title','value')}
        <th>Artists</th><th>Related Keywords</th>
    </tr></thead><tbody>`;
    filteredRows.forEach((row, i) => {
        const img = thumbUrl(row.image_urls);
        h += `<tr onclick="showDetailsByRow(${i})">
            <td onclick="event.stopPropagation()">
                ${img ? `<img src="${img}" class="image-thumbnail" alt="${row.value}" onclick="showDetailsByRow(${i})">` : '-'}
            </td>
            <td><code>${row.image_id}</code></td>
            <td class="truncate">${row.value}</td>
            <td>${fmtArray(row.artist_names)}</td>
            <td>${fmtArray(row.relatedKeywordStrings)}</td>
        </tr>`;
    });
    return h + '</tbody></table>';
}

function renderArtTextTable() {
    let h = `<table><thead><tr>
        ${th('ID','entry_id')} ${th('Title','value')} ${th('Type','type')}
        <th>Images</th><th>Related Keywords</th>
    </tr></thead><tbody>`;
    filteredRows.forEach((row, i) => {
        h += `<tr onclick="showDetailsByRow(${i})">
            <td><code>${row.entry_id}</code></td>
            <td class="truncate">${row.value}</td>
            <td>${row.type ? `<span class="type-badge">${row.type}</span>` : '-'}</td>
            <td>${fmtImagesColumn(row.images)}</td>
            <td>${fmtArray(row.relatedKeywordStrings)}</td>
        </tr>`;
    });
    return h + '</tbody></table>';
}

function fmtImagesColumn(jsonStr) {
    if (!jsonStr) return '-';
    try {
        const a = JSON.parse(jsonStr);
        if (!Array.isArray(a) || !a.length) return '-';
        const links = a.slice(0,3).map(id =>
            `<a href="#" onclick="event.stopPropagation();showArtImageById('${id}');return false;"
               style="color:#3498db;text-decoration:underline">${id}</a>`).join(', ');
        return links + (a.length > 3 ? ` <em>+${a.length-3}</em>` : '');
    } catch { return jsonStr.substring(0, 60); }
}

// ── COMICS renderers ─────────────────────────────────────────

function renderComicsTextTable() {
    let h = `<table><thead><tr>
        ${th('ID','entry_id')} ${th('Title','value')} ${th('Type','type')}
        <th>Related</th>
    </tr></thead><tbody>`;
    filteredRows.forEach((row, i) => {
        const isDrillable = row.type === 'series';
        h += `<tr onclick="${isDrillable
            ? `comicsDrillIntoSeries('${row.entry_id}', \`${row.value.replace(/`/g,"'")}\`)`
            : `showComicsDetailsByRow(${i})`
        }" style="cursor:pointer">
            <td><code>${row.entry_id}</code></td>
            <td class="truncate">${row.value}${isDrillable ? ' <span style="color:#8e44ad;font-size:11px">▸ browse</span>' : ''}</td>
            <td>${row.type ? `<span class="type-badge">${row.type}</span>` : '-'}</td>
            <td>${fmtArray(row.relatedKeywordStrings)}</td>
        </tr>`;
    });
    return h + '</tbody></table>';
}

function renderComicsBookTable() {
    let h = `<table><thead><tr>
        <th>Cover</th>
        ${th('Book ID','book_id')} ${th('Title','value')}
        ${th('Issue #','issue_number')} ${th('Date','cover_date')} ${th('Pages','page_count')}
    </tr></thead><tbody>`;
    filteredRows.forEach((row, i) => {
        // We'll lazy-load cover via cover_image_id — store it as data attr
        const coverId = row.cover_image_id || '';
        h += `<tr onclick="comicsDrillIntoBook('${row.book_id}', \`${row.value.replace(/`/g,"'")}\`)"
                  style="cursor:pointer">
            <td onclick="event.stopPropagation()">
                <img class="cover-thumb" data-cover-id="${coverId}"
                     src="" alt="cover"
                     onerror="this.style.display='none'"
                     onclick="showComicsDetailsByRow(${i})">
            </td>
            <td><code>${row.book_id}</code></td>
            <td class="truncate">${row.value} <span style="color:#8e44ad;font-size:11px">▸ pages</span></td>
            <td>${row.issue_number ?? '-'}</td>
            <td>${row.cover_date ?? '-'}</td>
            <td>${row.page_count ?? '-'}</td>
        </tr>`;
    });
    const table = h + '</tbody></table>';
    // Resolve cover thumbnails asynchronously after render
    setTimeout(resolveComicsCovers, 0);
    return table;
}

function renderComicsImageTable() {
    let h = `<table><thead><tr>
        <th>Image</th>
        ${th('ID','image_id')} ${th('Page','page_number')} ${th('Title','value')}
        <th>OCR Text</th>
        <th>Related</th>
    </tr></thead><tbody>`;
    filteredRows.forEach((row, i) => {
        const img = thumbUrl(row.image_urls);
        const ocrPreview = row.ocr_text
            ? `<span style="font-size:11px;color:#555;font-style:italic">${escHtml(row.ocr_text.substring(0, 80))}${row.ocr_text.length > 80 ? '…' : ''}</span>`
            : '<span style="color:#ccc;font-size:11px">—</span>';
        h += `<tr onclick="showComicsDetailsByRow(${i})">
            <td onclick="event.stopPropagation()">
                ${img ? `<img src="${img}" class="image-thumbnail" alt="p${row.page_number}" onclick="showComicsDetailsByRow(${i})">` : '-'}
            </td>
            <td><code>${row.image_id}</code></td>
            <td>${row.page_number ?? '-'}</td>
            <td class="truncate">${row.value}</td>
            <td style="max-width:220px">${ocrPreview}</td>
            <td>${fmtArray(row.relatedKeywordStrings)}</td>
        </tr>`;
    });
    return h + '</tbody></table>';
}

/**
 * After the book table renders, fetch cover URLs for any .cover-thumb elements
 * that have a data-cover-id attribute.
 */
function resolveComicsCovers() {
    document.querySelectorAll('img.cover-thumb[data-cover-id]').forEach(img => {
        const coverId = img.getAttribute('data-cover-id');
        if (!coverId) { img.style.display = 'none'; return; }
        fetch('/api/comics/lookup', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ entryId: coverId, type: 'image' })
        })
        .then(r => r.json())
        .then(data => {
            if (data.error) { img.style.display = 'none'; return; }
            const url = thumbUrl(data.image_urls);
            if (url) { img.src = url; } else { img.style.display = 'none'; }
        })
        .catch(() => img.style.display = 'none');
    });
}

// ============================================================
//  POETRY DB – table switching & drill-down
// ============================================================
function poetrySwitchTable(tableName) {
    poetryFilter = { book_id: null, bookLabel: null };
    currentTable = tableName;
    currentPage  = 1;
    sortColumn   = null;
    updatePoetryTabHighlight(tableName);
    updatePoetryBreadcrumb();
    loadData();
}

function updatePoetryTabHighlight(tableName) {
    document.getElementById('ptab-text').classList.toggle('active', tableName === 'text_entries');
    document.getElementById('ptab-book').classList.toggle('active', tableName === 'book_entries');
    document.getElementById('ptab-line').classList.toggle('active', tableName === 'line_entries');
}

function poetryDrillIntoBook(bookId, bookLabel) {
    poetryFilter.book_id   = bookId;
    poetryFilter.bookLabel = bookLabel;
    currentTable = 'line_entries';
    currentPage  = 1;
    sortColumn   = null;
    updatePoetryTabHighlight('line_entries');
    updatePoetryBreadcrumb();
    loadData();
}

function poetryDrillTo(tableName) {
    if (tableName === 'text_entries') {
        poetryFilter = { book_id: null, bookLabel: null };
    }
    // 'line_entries' keeps the current book filter
    currentTable = tableName;
    currentPage  = 1;
    sortColumn   = null;
    updatePoetryTabHighlight(tableName);
    updatePoetryBreadcrumb();
    loadData();
}

function updatePoetryBreadcrumb() {
    const sep     = document.getElementById('pcrumb-sep-1');
    const bookBtn = document.getElementById('pcrumb-book-btn');
    if (poetryFilter.book_id) {
        sep.style.display     = '';
        bookBtn.style.display = '';
        bookBtn.textContent   = poetryFilter.bookLabel || poetryFilter.book_id;
    } else {
        sep.style.display     = 'none';
        bookBtn.style.display = 'none';
    }
}

// ── POETRY renderers ─────────────────────────────────────────

function renderPoetryLineTable() {
    let h = `<table><thead><tr>
        ${th('Line #','line_number')} <th>Line</th> <th>Book</th>
    </tr></thead><tbody>`;
    filteredRows.forEach((row, i) => {

function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── POETRY modals ────────────────────────────────────────────

function showPoetryDetailsByRow(i) {
    if (!filteredRows?.[i]) return;
    const row = filteredRows[i];
    document.getElementById('modal-title').textContent = row.value || 'Details';
    let html = '';
    if (currentTable === 'book_entries')      html = buildPoetryBookDetails(row);
    else if (currentTable === 'line_entries') html = buildPoetryLineDetails(row);
    else                                      html = buildPoetryTextDetails(row);
    document.getElementById('modal-body').innerHTML = html;
    document.getElementById('detailModal').style.display = 'block';
}

function buildPoetryLineDetails(row) {
    let h = '';
    h += dr('Line', `<span class="poetry-line-text" style="font-size:16px">${escHtml(row.value || '')}</span>`);
    h += dr('Line #', row.line_number);
    h += dr('Book', row.book_id
        ? `<a class="drill" onclick="poetryDrillIntoBook('${row.book_id}','${row.book_id}');closeModal()">${row.book_id}</a>`
        : '-');
    h += drJson('Descriptions', row.descriptions);
    h += drJson('Related', row.relatedKeywordStrings);

}

function buildPoetryBookDetails(row) {
    const authorLabel = (() => {
        try { return JSON.parse(row.relatedKeywordStrings || '[]')[0] || '-'; } catch { return '-'; }
    })();
    let h = '';
    h += dr('Book ID', `<code>${row.book_id}</code>`);
    h += dr('Title', row.value);
    h += dr('Author', authorLabel);
    h += dr('Line Count', row.line_count);
    h += dr('Gutenberg', row.gid
        ? `<a href="https://www.gutenberg.org/ebooks/${row.gid}" target="_blank" style="color:#27ae60">#${row.gid}</a>`
        : '-');

    h += drJson('Related', row.relatedKeywordStrings);

        .then(data => {

        .catch(() => {
            const el = document.getElementById('modal-poetry-lines');

function buildPoetryTextDetails(row) {

// ============================================================
//  PAGINATION / STATS
// ============================================================
function updatePagination(data) {
    totalRows = data.total_rows;
    let ps = (pageSize === 'all') ? totalRows : (parseInt(pageSize, 10) || 25);
    totalPages = Math.ceil(totalRows / ps) || 1;

    document.getElementById('prev-btn-top').disabled = currentPage === 1;
    document.getElementById('next-btn-top').disabled = currentPage === totalPages;

    const start = (currentPage - 1) * ps + 1;
    const end   = Math.min(currentPage * ps, totalRows);
    document.getElementById('page-info-top').textContent =
        `Page ${currentPage} of ${totalPages} (${start}–${end} of ${totalRows})`;
}
function updateStats(data) {
    let labels;
    if (activeDb === 'poetry') {
        labels = { text_entries: 'Authors / Subjects', book_entries: 'Books', line_entries: 'Lines' };
    } else {
        labels = {
            image_entries: 'Image Entries',
            text_entries:  activeDb === 'comics' ? 'Series / Creators' : 'Text Entries',
            book_entries:  'Books / Issues',
        };
    }
    document.getElementById('stats').textContent =
        `${labels[currentTable] || currentTable}: ${data.total_rows.toLocaleString()} records`;
}

// ── detail row builder ──────────────────────────────────────
function dr(label, value) {
    return `<div class="detail-row"><div class="detail-label">${label}:</div><div class="detail-value">${value ?? '-'}</div></div>`;
}
function drJson(label, jsonStr) {
    if (!jsonStr) return dr(label, '-');
    try {
        return dr(label, `<pre class="json">${JSON.stringify(JSON.parse(jsonStr), null, 2)}</pre>`);
    } catch { return dr(label, jsonStr); }
}

function loadModalPageGrid(bookId) {
    fetch(`/api/comics/book_pages/${encodeURIComponent(bookId)}`)
        .then(r => r.json())
        .then(data => {
            const grid = document.getElementById('modal-page-grid');
            if (!grid) return;
            if (!data.success || !data.pages.length) { grid.innerHTML = '<em>No pages found</em>'; return; }
            grid.innerHTML = data.pages.map(p => {
                const img = thumbUrl(p.image_urls) || '';
                return `<div class="page-cell" onclick="showComicsImageInModal('${p.image_id}')">
                    ${img ? `<img src="${img}" alt="p${p.page_number}" loading="lazy">` : ''}

        })
        .catch(() => {
            const grid = document.getElementById('modal-page-grid');

function buildComicsImageDetails(row) {

function buildComicsTextDetails(row) {

// ── shared sub-builders ───────────────────────────────────────
function buildImagesListHtml(jsonStr, db) {
    if (!jsonStr) return dr('Images', '-');
    try {
        const a = JSON.parse(jsonStr);
        if (!a.length) return dr('Images', '-');
        const links = a.map(id => {
            const fn = db === 'comics' ? `showComicsImageInModal('${id}')` : `showArtImageById('${id}')`;
            return `<a href="#" onclick="event.preventDefault();${fn}" style="color:#3498db;text-decoration:underline">${id}</a>`;
        }).join(', ');
        return dr('Images', links);
    } catch { return dr('Images', jsonStr); }
}

function buildRelatedKeywordIdsHtml(jsonStr, db) {
    if (!jsonStr) return dr('Related Keyword IDs', '-');
    try {
        const a = JSON.parse(jsonStr);
        if (!a.length) return dr('Related Keyword IDs', '-');
        const links = a.map(id => {
            const fn = db === 'comics'
                ? `showComicsEntryById('${id}')`
                : `showDetailsByKeywordId('${id}')`;
            return `<a href="#" onclick="event.preventDefault();${fn}" style="color:#3498db;text-decoration:underline">${id}</a>`;
        }).join(', ');
        return dr('Related Keyword IDs', links);
    } catch { return dr('Related Keyword IDs', jsonStr); }
}

// ── lookup helpers ────────────────────────────────────────────
function showComicsEntryById(entryId) {
    // Determine type from ID prefix
    let type = 'text';
    if (entryId.match(/^cbp_\d+_p\d+/)) type = 'image';
    else if (entryId.match(/^cbp_\d+$/))  type = 'book';

    fetch('/api/comics/lookup', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ entryId, type })
    })
    .then(r => r.json())
    .then(data => {
        if (data.error) { alert('Not found: ' + data.error); return; }
        document.getElementById('modal-title').textContent = data.value || entryId;
        if (type === 'image')      document.getElementById('modal-body').innerHTML = buildComicsImageDetails(data);
        else if (type === 'book')  document.getElementById('modal-body').innerHTML = buildComicsBookDetails(data);
        else                       document.getElementById('modal-body').innerHTML = buildComicsTextDetails(data);
    });
}

function showArtImageById(imageId) {
    fetch('/lookup_entry', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ entryId: imageId, type: 'image' })
    })
    .then(r => r.json())
    .then(data => {
        if (data.error) { alert('Not found: ' + data.error); return; }
        document.getElementById('modal-title').textContent = data.value || 'Image';
        document.getElementById('modal-body').innerHTML = buildArtImageDetails(data);
    });
}

function showDetailsByKeywordId(textId) {
    fetch('/lookup_entry', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ entryId: textId, type: 'text' })
    })
    .then(r => r.json())
    .then(data => {
        if (data.error) { alert('Not found: ' + data.error); return; }
        document.getElementById('modal-title').textContent = data.value || 'Text Entry';
        document.getElementById('modal-body').innerHTML = buildArtTextDetails(data);
    });
}

// ============================================================
//  JSON DOWNLOAD
// ============================================================
function downloadCurrentTableAsJSON() {
    const sizeVal = document.getElementById('download-size').value;
    const ps = sizeVal === 'all' ? 1_000_000 : (parseInt(sizeVal, 10) || 100);

    let url = activeDb === 'art'
        ? `/api/browse_database?table=${currentTable}&page=1&page_size=${ps}`
        : activeDb === 'comics'
        ? `/api/comics/browse?table=${currentTable}&page=1&page_size=${ps}`
        : `/api/poetry/browse?table=${currentTable}&page=1&page_size=${ps}`;
    if (sortColumn) url += `&sort_by=${sortColumn}&sort_dir=${sortDirection}`;

    fetch(url).then(r => r.json()).then(data => {
        if (!data.success) { alert('Download failed: ' + (data.error || 'Unknown')); return; }
        const rows = data.rows.map(row => {
            const out = { ...row };
            for (const k in out) {
                if (typeof out[k] === 'string' &&
                    ((out[k].startsWith('[') && out[k].endsWith(']')) ||
                     (out[k].startsWith('{') && out[k].endsWith('}')))) {
                    try { out[k] = JSON.parse(out[k]); } catch {}
                }
            }
            return out;
        });
        const blob = new Blob([JSON.stringify(rows, null, 2)], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `${activeDb}_${currentTable}.json`;
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
    }).catch(e => alert('Download failed: ' + e));
}
